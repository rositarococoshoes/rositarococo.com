name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp -R astrocline/. site/
          cp index.html site/index.html
          cp index-contrareembolso.html site/index-contrareembolso.html
          cp gracias-1par.html site/gracias-1par.html
          cp gracias-1par-c.html site/gracias-1par-c.html
          cp gracias-2pares.html site/gracias-2pares.html
          cp gracias-2pares-c.html site/gracias-2pares-c.html
          cp gracias-pago.html site/gracias-pago.html
          cp gracias-pago-2pares.html site/gracias-pago-2pares.html
          cp gracias-pago-pendiente.html site/gracias-pago-pendiente.html
          cp transferenciacbu-1par.html site/transferenciacbu-1par.html
          cp transferenciacbu-2pares.html site/transferenciacbu-2pares.html
          cp 404.html site/404.html
          mkdir -p site/2026
          cp -R 2026/. site/2026/
          rm -rf site/2026/_next-src
          cp CNAME site/CNAME
          cp .nojekyll site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
